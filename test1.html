<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASHANG VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#050505;color:#fff;overflow-x:hidden}

/* NAVBAR NEON */
nav{
position:fixed;top:0;width:100%;
display:flex;align-items:center;justify-content:space-between;
padding:15px 40px;background:#000;
border-bottom:2px solid #00f7ff;
box-shadow:0 0 20px #00f7ff;
z-index:999;
}

/* LOGO */
.logoBox{display:flex;align-items:center;gap:10px}
.logoBox img{width:40px;height:40px;border-radius:50%}
.logoText{font-size:26px;font-weight:800;color:#00f7ff}

/* MENU */
.menu a{
margin-left:20px;text-decoration:none;color:#fff;font-weight:600;
padding:8px 15px;border-radius:20px;transition:.3s;
}
.menu a:hover{
box-shadow:0 0 10px #00f7ff,0 0 25px #00f7ff;
background:#00f7ff;color:#000;
}

/* MARQUEE */
.marquee{flex:1;margin-left:30px;overflow:hidden;white-space:nowrap;color:#ff00ea;font-weight:600}
.marquee span{display:inline-block;padding-left:100%;animation:marq 15s linear infinite}
@keyframes marq{100%{transform:translateX(-100%)}}

/* HERO SLIDER */
.hero{margin-top:80px;height:90vh;position:relative;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s}
.slide img{width:100%;height:100%;object-fit:cover}
.active{opacity:1}

.heroText{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.heroText h1{font-size:60px;text-shadow:0 0 20px #00f7ff}
.cta{
margin-top:20px;padding:14px 35px;border:none;border-radius:30px;
background:#00f7ff;font-weight:800;font-size:18px;cursor:pointer;
transition:.3s;text-decoration:none;color:#000;display:inline-block;
}
.cta:hover{box-shadow:0 0 15px #00f7ff,0 0 40px #00f7ff}

/* SECTIONS */
.section{padding:80px 60px;text-align:center}
.section h2{font-size:40px;margin-bottom:40px;color:#ff00ea}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.card{overflow:hidden;border-radius:20px;transition:.4s}
.card img{width:100%;display:block}
.card:hover{transform:translateY(-10px);box-shadow:0 0 25px #ff00ea,0 0 50px #00f7ff}
</style>
</head>

<body>

<nav>
<div class="logoBox">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968804.png">
<div class="logoText">ASHANG</div>
</div>

<div class="marquee">
<span>📍 89 Trần Hưng Đạo • Hotline 0909 999 999 • VIP SERVICE 24/7</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#ban">Bàn</a>
<a href="#linhkien">Linh kiện</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<div class="slide active"><img src="https://picsum.photos/1920/1080?1"></div>
<div class="slide"><img src="https://picsum.photos/1920/1080?2"></div>
<div class="slide"><img src="https://picsum.photos/1920/1080?3"></div>
<div class="slide"><img src="https://picsum.photos/1920/1080?4"></div>
<div class="slide"><img src="https://picsum.photos/1920/1080?5"></div>

<div class="heroText">
<h1>VIP LOUNGE</h1>
<a class="cta" href="https://t.me/ashang295199" target="_blank">LIÊN HỆ NGAY TELEGRAM</a>
</div>
</div>

<!-- ẢNH BÀN -->
<div class="section" id="ban">
<h2>Ảnh bàn VIP</h2>
<div class="grid">
<div class="card"><img src="https://picsum.photos/500?1"></div>
<div class="card"><img src="https://picsum.photos/500?2"></div>
<div class="card"><img src="https://picsum.photos/500?3"></div>
</div>
</div>

<!-- LINH KIỆN -->
<div class="section" id="linhkien">
<h2>Linh kiện nổi bật</h2>
<div class="grid">
<div class="card"><img src="https://picsum.photos/500?4"></div>
<div class="card"><img src="https://picsum.photos/500?5"></div>
<div class="card"><img src="https://picsum.photos/500?6"></div>
<div class="card"><img src="https://picsum.photos/500?7"></div>
<div class="card"><img src="https://picsum.photos/500?8"></div>
</div>
</div>

<script>
let slides=document.querySelectorAll(".slide");let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},2000);
</script>

</body>
</html>
